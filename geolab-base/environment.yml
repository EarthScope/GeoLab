channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  # --- Jupyter server + extensions ---
  - jupyterhub
  - jupyter_server
  - jupyterlab
  - ipykernel
  - jupyter-resource-usage
  - jupyter-ruff
  - jupyter-server-proxy
  - jupyterlab-git
  - jupyterlab-myst
  - jupyterlab_code_formatter
  - jupyterlab_pygments
  - nbdime
  # --- Cloud & storage ---
  - awscli
  - awswrangler
  - boto3
  - fsspec
  - obstore
  - s3fs
  # --- Array / data ---
  - numpy
  - scipy
  - pandas
  - polars
  - xarray
  - bottleneck
  - flox
  - h5py
  - netcdf4
  - h5netcdf
  - pyarrow
  - cvxpy
  - zarr
  - virtualizarr
  - numba
  - pooch
  # --- Parallel computing ---
  - dask
  - dask-gateway
  - distributed
  # --- Visualization ---
  - matplotlib-base
  - altair
  - hvplot
  - holoviews
  - vegafusion
  - vl-convert-python>=1.9.0
  - plotly
  - ipympl
  - panel
  # --- Interactive widgets ---
  - ipywidgets
  - anywidget
  - bqplot
  - ipytree
  - itables
  - ipydatagrid
  - sidecar
  # --- Geospatial ---
  - cartopy
  - contextily
  - fiona
  - folium
  - gdal
  - geopandas
  - ipyleaflet
  - lonboard
  - pyproj
  - shapely
  # --- Geophysics ---
  - dascore
  - obspy
  - obsplus
  - gmt
  - pygmt
  # --- System / binary tools ---
  - ffmpeg
  - ghostscript  # runtime dep for GMT/pygmt
  # --- Dev tools and utilities ---
  - gh
  - gh-scoped-creds
  - pip
  - pytest
  - pyyaml
  - requests
  - ruff
  - tqdm
